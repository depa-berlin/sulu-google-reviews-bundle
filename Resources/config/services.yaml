parameters:
    # Leere Defaults, damit das Bundle ohne Eintraege in .env funktioniert.
    # Die echten Werte werden projektseitig in .env.local (Server) gesetzt.
    env(GOOGLE_PLACES_API_KEY): ''
    env(GOOGLE_PLACE_ID): ''

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Depa\SuluGoogleReviewsBundle\:
        resource: '../../src/'
        exclude:
            - '../../src/Entity/'
            - '../../src/DependencyInjection/'
            - '../../src/Translation/'
            - '../../src/DepaSuluGoogleReviewsBundle.php'

    Depa\SuluGoogleReviewsBundle\Admin\GoogleReviewsAdmin:
        tags:
            - { name: sulu.admin }
            - { name: sulu.context, context: admin }

    Depa\SuluGoogleReviewsBundle\Controller\Admin\GoogleReviewController:
        public: true
        tags:
            - { name: sulu.context, context: admin }
            - { name: controller.service_arguments }

    Depa\SuluGoogleReviewsBundle\Command\FetchGoogleReviewsCommand:
        arguments:
            $apiKey: '%env(GOOGLE_PLACES_API_KEY)%'
            $placeId: '%env(GOOGLE_PLACE_ID)%'
        tags:
            - { name: console.command }
